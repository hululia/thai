    <style>
        body { font-family: 'Sarabun', sans-serif; overflow: hidden; }
        .perspective { perspective: 1000px; }
        .backface-hidden { backface-visibility: hidden; }
        .card-inner { transition: transform 0.6s; transform-style: preserve-3d; }
        .active-tab { border-bottom: 4px solid #f43f5e; color: #f43f5e; font-weight: bold; }
        .tab-item { transition: all 0.2s; cursor: pointer; white-space: nowrap; }
        /* 隐藏滚动条但保留滚动功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }

    </style>

    </div>

    <div class="w-full max-w-md flex flex-col flex-1 p-4 h-[calc(100vh-120px)]">

        </div>

        <div class="perspective w-full flex-1 mb-6 cursor-pointer" onclick="flipCard()">
            <div id="cardInner" class="card-inner relative w-full h-full text-center">
                
                <div class="absolute w-full h-full bg-white rounded-3xl shadow-xl border-2 border-rose-100 flex flex-col items-center justify-center p-8 backface-hidden">

                    <p id="wordRoman" class="text-xl text-rose-400 font-mono mb-8 italic">...</p>

                            <h3 id="wordChn" class="text-xl text-slate-400 mt-1 font-light">...</h3>

                            </button>
                            <p id="exThai" class="text-lg font-medium text-white mb-2 leading-relaxed">...</p>
                            <p id="exEng" class="text-xs text-rose-200/60 italic mb-1">...</p>
                            <p id="exChn" class="text-xs text-slate-400">...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-4 mb-4">
            <button onclick="prevCard()" class="py-4 bg-white text-slate-600 rounded-2xl shadow hover:bg-slate-50 font-bold active:scale-95 transition">Prev</button>
            <button onclick="shuffleCards()" class="py-4 bg-rose-100 text-rose-600 rounded-2xl shadow hover:bg-rose-200 active:rotate-6 transition">Shuffle</button>
            <button onclick="nextCard()" class="py-4 bg-rose-500 text-white rounded-2xl shadow hover:bg-rose-600 font-bold active:scale-95 transition">Next</button>
        </div>
    </div>

        // --- APP LOGIC ---
        let currentTab = 'greetings';
        let currentIndex = 0;
        let isFlipped = false;
        let currentCards = [];

        function switchTab(tabId) {
            currentTab = tabId;
            currentIndex = 0;
            isFlipped = false;
            currentCards = [...allData[tabId]];
            
            // UI Updates
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active-tab'));
            document.getElementById(`tab-${tabId}`).classList.add('active-tab');
            document.getElementById('categoryName').textContent = tabId.toUpperCase();
            
            updateCard();
        }

        function updateCard() {
            const item = currentCards[currentIndex];
            if(!item) return;

            document.getElementById('wordThai').textContent = item.thai;
            document.getElementById('wordRoman').textContent = item.roman;
            document.getElementById('wordEng').textContent = item.eng;
            document.getElementById('wordChn').textContent = item.chn;
            document.getElementById('exThai').textContent = item.ex.thai;
            document.getElementById('exEng').textContent = item.ex.eng;
            document.getElementById('exChn').textContent = item.ex.chn;

            document.getElementById('counter').textContent = `${currentIndex + 1} / ${currentCards.length}`;
            document.getElementById('progressBar').style.width = `${((currentIndex + 1) / currentCards.length) * 100}%`;
            
            isFlipped = false;
            document.getElementById('cardInner').style.transform = 'rotateY(0deg)';
        }

        function flipCard() {
            isFlipped = !isFlipped;
            document.getElementById('cardInner').style.transform = isFlipped ? 'rotateY(180deg)' : 'rotateY(0deg)';
        }

        function nextCard() { currentIndex = (currentIndex + 1) % currentCards.length; updateCard(); }
        function prevCard() { currentIndex = (currentIndex - 1 + currentCards.length) % currentCards.length; updateCard(); }
        function shuffleCards() { currentCards.sort(() => Math.random() - 0.5); currentIndex = 0; updateCard(); }

        function speak(text) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'th-TH'; u.rate = 0.8;
            window.speechSynthesis.speak(u);
        }
        function speakThai() { speak(currentCards[currentIndex].thai); }
        function speakExample() { speak(currentCards[currentIndex].ex.thai); }

        // Initial Load
        switchTab('greetings');
    </script>
