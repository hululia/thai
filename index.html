        <div class="perspective w-full flex-1 mb-6 cursor-pointer" onclick="flipCard()">

                            <p id="exChn" class="text-sm text-slate-400">...</p>

                </div>
            </div>

            <button onclick="nextCard()" class="py-4 bg-rose-500 text-white rounded-2xl shadow-lg hover:bg-rose-600 font-bold active:scale-95 transition-transform">Next</button>

        function updateCard() {
            const item = cards[currentIndex];
            document.getElementById('wordThai').textContent = item.thai;
            document.getElementById('wordRoman').textContent = item.roman;
            document.getElementById('wordEng').textContent = item.eng;
            document.getElementById('wordChn').textContent = item.chn;
            document.getElementById('exThai').textContent = item.ex.thai;
            document.getElementById('exEng').textContent = item.ex.eng;
            document.getElementById('exChn').textContent = item.ex.chn;

            progressBar.style.width = `${((currentIndex + 1) / cards.length) * 100}%`;
            isFlipped = false;
            cardInner.style.transform = 'rotateY(0deg)';
        }

        function flipCard() {
            isFlipped = !isFlipped;
            cardInner.style.transform = isFlipped ? 'rotateY(180deg)' : 'rotateY(0deg)';
        }

        function nextCard() { currentIndex = (currentIndex + 1) % cards.length; updateCard(); }
        function prevCard() { currentIndex = (currentIndex - 1 + cards.length) % cards.length; updateCard(); }
        function shuffleCards() { cards.sort(() => Math.random() - 0.5); currentIndex = 0; updateCard(); }

        function speak(text) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'th-TH'; u.rate = 0.8;
            window.speechSynthesis.speak(u);
        }
