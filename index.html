<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thai Friend & Gossip Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; }
        .perspective { perspective: 1000px; }
        .backface-hidden { backface-visibility: hidden; }
        .card-inner { transition: transform 0.6s; transform-style: preserve-3d; }
    </style>
</head>
<body class="bg-rose-50 flex flex-col items-center min-h-screen p-4 text-slate-800">

    <div class="w-full max-w-md flex flex-col h-screen max-h-[850px]">
        
        <div class="text-center mb-4 mt-2">
            <h1 class="text-3xl font-bold text-rose-900">Thai Gossip & Friends</h1>
            <p class="text-xs text-rose-500 uppercase tracking-widest font-bold">Social & Small Talk Edition</p>
        </div>

        <div class="w-full bg-rose-200 rounded-full h-2 mb-2">
            <div id="progressBar" class="bg-rose-500 h-2 rounded-full transition-all duration-300" style="width: 1%"></div>
        </div>
        <div class="flex justify-between text-xs text-rose-400 mb-2 font-mono">
            <span id="counter">1 / 50</span>
            <span class="bg-rose-100 text-rose-700 px-2 rounded">Friendship & Slang</span>
        </div>

        <div class="perspective w-full flex-1 mb-6 cursor-pointer" onclick="flipCard()">
            <div id="cardInner" class="card-inner relative w-full h-full text-center">
                
                <div class="absolute w-full h-full bg-white rounded-3xl shadow-2xl border-4 border-white flex flex-col items-center justify-center p-6 backface-hidden">
                    <h2 id="wordThai" class="text-6xl font-bold text-slate-800 mb-2 mt-8">...</h2>
                    <p id="wordRoman" class="text-xl text-rose-400 font-mono mb-6">...</p>
                    <button onclick="event.stopPropagation(); speakThai()" class="p-5 bg-rose-50 text-rose-500 rounded-full hover:bg-rose-100 transition shadow-inner">
                        <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 5L6 9H2v6h4l5 4V5zM19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"></path></svg>
                    </button>
                    <p class="text-[10px] text-slate-300 uppercase mt-auto tracking-widest">Tap to reveal gossip</p>
                </div>

                <div class="absolute w-full h-full bg-slate-800 text-white rounded-3xl shadow-2xl flex flex-col items-center justify-center p-6 backface-hidden" style="transform: rotateY(180deg);">
                    <div class="w-full flex-1 flex flex-col justify-center">
                        <div class="mb-6 border-b border-slate-600 pb-4">
                            <h3 id="wordEng" class="text-3xl font-bold text-rose-300">...</h3>
                            <h3 id="wordChn" class="text-xl text-slate-400 mt-1">...</h3>
                        </div>
                        <div class="bg-slate-700/50 p-5 rounded-2xl text-left relative border border-slate-600">
                            <button onclick="event.stopPropagation(); speakExample()" class="absolute top-4 right-4 text-rose-300 hover:text-white">
                                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 5L6 9H2v6h4l5 4V5zM19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"></path></svg>
                            </button>
                            <p id="exThai" class="text-lg font-medium text-white pr-6 leading-relaxed">...</p>
                            <p id="exEng" class="text-sm text-rose-200/70 italic mt-2">...</p>
                            <p id="exChn" class="text-sm text-slate-400">...</p>
                        </div>
                    </div>
                    <p class="text-[10px] text-slate-500 uppercase mt-auto tracking-widest">Tap to flip back</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-4 mb-8">
            <button onclick="prevCard()" class="py-4 bg-white text-slate-600 rounded-2xl shadow-md hover:bg-slate-50 font-bold active:scale-95 transition-transform">Prev</button>
            <button onclick="shuffleCards()" class="py-4 bg-rose-100 text-rose-600 rounded-2xl shadow-md hover:bg-rose-200 active:rotate-12 transition-all">Shuffle</button>
            <button onclick="nextCard()" class="py-4 bg-rose-500 text-white rounded-2xl shadow-lg hover:bg-rose-600 font-bold active:scale-95 transition-transform">Next</button>
        </div>
    </div>

    <script>
        const database = [
            { thai: "แฟน", roman: "faaen", eng: "Boyfriend / Girlfriend", chn: "男/女朋友", ex: { thai: "เขามีแฟนหรือยัง", eng: "Does he have a partner yet?", chn: "他有对象了吗？" } },
            { thai: "เพื่อนสนิท", roman: "phûuean sà-nìt", eng: "Best friend", chn: "死党 / 闺蜜", ex: { thai: "เราเป็นเพื่อนสนิทกัน", eng: "We are best friends.", chn: "我们是好朋友。" } },
            { thai: "หล่อ", roman: "lǎaw", eng: "Handsome", chn: "帅", ex: { thai: "ผู้ชายคนนั้นหล่อมาก", eng: "That guy is so handsome.", chn: "那个男生很帅。" } },
            { thai: "สวย", roman: "sǔuai", eng: "Beautiful", chn: "漂亮", ex: { thai: "วันนี้คุณแต่งตัวสวยจัง", eng: "You dressed up so beautifully today.", chn: "你今天穿得很漂亮。" } },
            { thai: "น่ารัก", roman: "nâa-rák", eng: "Cute", chn: "可爱", ex: { thai: "น้องสาวคุณน่ารักมาก", eng: "Your younger sister is very cute.", chn: "你妹妹很可爱。" } },
            { thai: "แอบชอบ", roman: "àaep châwp", eng: "Secret crush", chn: "暗恋", ex: { thai: "ฉันแอบชอบรุ่นพี่", eng: "I have a secret crush on a senior.", chn: "我暗恋一个学长。" } },
            { thai: "โสด", roman: "sòot", eng: "Single", chn: "单身", ex: { thai: "ตอนนี้ผมยังโสดครับ", eng: "I am still single right now.", chn: "我现在还单身。" } },
            { thai: "เนื้อคู่", roman: "núuea-khûu", eng: "Soulmate", chn: "灵魂伴侣", ex: { thai: "เขาคือเนื้อคู่ของฉัน", eng: "He is my soulmate.", chn: "他是我的真命天子。" } },
            { thai: "อกหัก", roman: "òk-hàk", eng: "Heartbroken", chn: "失恋 / 伤心", ex: { thai: "เพื่อนฉันเพิ่งอกหัก", eng: "My friend just got heartbroken.", chn: "我的朋友刚失恋。" } },
            { thai: "คิดถึง", roman: "khít-thǔng", eng: "To miss (someone)", chn: "想念", ex: { thai: "คิดถึงทุกคนนะ", eng: "I miss everyone.", chn: "我想念大家。" } },
            { thai: "ตลก", roman: "dtà-lòk", eng: "Funny", chn: "好笑", ex: { thai: "เรื่องนี้ตลกมาก", eng: "This story is very funny.", chn: "这件事很好笑。" } },
            { thai: "นินทา", roman: "nin-thaa", eng: "To gossip", chn: "说坏话 / 八卦", ex: { thai: "อย่าไปนินทาเขาเลย", eng: "Don't go gossiping about them.", chn: "别去说他坏话。" } },
            { thai: "ความลับ", roman: "khwaam-láp", eng: "Secret", chn: "秘密", ex: { thai: "อย่าบอกความลับนี้นะ", eng: "Don't tell this secret, okay?", chn: "别把这个秘密说出去。" } },
            { thai: "จริงเหรอ", roman: "jing rǒer", eng: "Really?", chn: "真的吗？", ex: { thai: "จริงเหรอ ไม่ยากเชื่อเลย", eng: "Really? I can hardly believe it.", chn: "真的吗？简直不敢相信。" } },
            { thai: "โกหก", roman: "goo-hòk", eng: "To lie", chn: "撒谎", ex: { thai: "เขาโกหกฉัน", eng: "He lied to me.", chn: "他骗了我。" } },
            { thai: "ใจอ่อน", roman: "jai-àawn", eng: "Soft-hearted", chn: "心软", ex: { thai: "เดี๋ยวเธอก็ใจอ่อน", eng: "She will be soft-hearted soon.", chn: "过一会儿她就会心软的。" } },
            { thai: "งอน", roman: "ngǎwn", eng: "To pout / sulk", chn: "闹别扭 / 撒娇", ex: { thai: "แฟนผมกำลังงอน", eng: "My girlfriend is sulking.", chn: "我女朋友在闹别扭。" } },
            { thai: "ง้อ", roman: "ngáaw", eng: "To make up / reconcile", chn: "哄 / 赔罪", ex: { thai: "ไปง้อแฟนเร็วๆ", eng: "Go make up with your girlfriend quickly.", chn: "快去哄哄你女朋友。" } },
            { thai: "เจ้าชู้", roman: "jâo-chûu", eng: "Flirtatious / Playboy", chn: "花心", ex: { thai: "เขาเป็นคนเจ้าชู้", eng: "He is a flirtatious person.", chn: "他是个花心的人。" } },
            { thai: "ขี้เกียจ", roman: "khîi-gìiat", eng: "Lazy", chn: "懒", ex: { thai: "วันนี้ขี้เกียจจัง", eng: "I feel so lazy today.", chn: "今天好懒啊。" } },
            { thai: "นิสัยดี", roman: "ní-sǎi dii", eng: "Good personality", chn: "人品好 / 性格好", ex: { thai: "เพื่อนคนนี้นิสัยดีมาก", eng: "This friend has a very good personality.", chn: "这个朋友性格非常好。" } },
            { thai: "บ้า", roman: "bâa", eng: "Crazy", chn: "疯", ex: { thai: "คุณบ้าไปแล้วเหรอ", eng: "Have you gone crazy?", chn: "你疯了吗？" } },
            { thai: "เบื่อ", roman: "bùuea", eng: "Bored", chn: "无聊 / 烦", ex: { thai: "ฉันเบื่องานนี้มาก", eng: "I'm so bored of this job.", chn: "我很烦这份工作。" } },
            { thai: "ใจร้าย", roman: "jai-ráai", eng: "Mean / Cruel", chn: "狠心 / 坏", ex: { thai: "ทำไมคุณใจร้ายจัง", eng: "Why are you so mean?", chn: "你怎么这么心狠？" } },
            { thai: "อิจฉา", roman: "ìt-chǎa", eng: "Jealous / Envious", chn: "嫉妒 / 羡慕", ex: { thai: "ฉันอิจฉาเธอจัง", eng: "I'm so jealous of you.", chn: "我真羡慕你。" } },
            { thai: "เพื่อนฝูง", roman: "phûuean-fǔung", eng: "Circle of friends", chn: "亲朋好友", ex: { thai: "ไปเที่ยวกับเพื่อนฝูง", eng: "Go out with the circle of friends.", chn: "跟朋友们出去玩。" } },
            { thai: "เหงา", roman: "ngǎo", eng: "Lonely", chn: "孤独 / 寂寞", ex: { thai: "อยู่บ้านคนเดียวแล้วเหงา", eng: "Staying home alone is lonely.", chn: "一个人在家很寂寞。" } },
            { thai: "ขี้อาย", roman: "khîi-aai", eng: "Shy", chn: "害羞", ex: { thai: "เขาเป็นคนขี้อาย", eng: "He is a shy person.", chn: "他是个害羞的人。" } },
            { thai: "ปากหวาน", roman: "bpàak-wǎan", eng: "Sweet-talker", chn: "嘴甜", ex: { thai: "คุณนี่ปากหวานจัง", eng: "You're such a sweet-talker.", chn: "你嘴真甜。" } },
            { thai: "ไฮโซ", roman: "hai-soo", eng: "High society / Posh", chn: "高大上 / 名流", ex: { thai: "ร้านนี้ไฮโซมาก", eng: "This shop is very posh.", chn: "这家店很高级。" } },
            { thai: "เซอร์ไพรส์", roman: "sooe-phrai", eng: "Surprise", chn: "惊喜", ex: { thai: "ฉันมีเซอร์ไพรส์ให้เธอ", eng: "I have a surprise for you.", chn: "我有个惊喜要给你。" } },
            { thai: "แฮงค์เอาท์", roman: "haaeng-ao", eng: "Hang out", chn: "聚会 / 闲逛", ex: { thai: "ไปแฮงค์เอาท์กันไหม", eng: "Do you want to go hang out?", chn: "要去聚聚吗？" } },
            { thai: "ดราม่า", roman: "draa-mâa", eng: "Drama", chn: "戏剧化 / 破事多", ex: { thai: "ไม่อยากมีดราม่า", eng: "I don't want any drama.", chn: "我不想闹出什么破事。" } },
            { thai: "ขี้โม้", roman: "khîi-móo", eng: "To brag / boast", chn: "吹牛", ex: { thai: "เขาชอบขี้โม้เรื่องเงิน", eng: "He likes to brag about money.", chn: "他喜欢吹牛说钱的事。" } },
            { thai: "สายเปย์", roman: "sǎai-bpee", eng: "Big spender (on others)", chn: "大方的人 / 肯花钱的人", ex: { thai: "แฟนคนนี้สายเปย์มาก", eng: "This partner is a big spender.", chn: "这个对象很肯花钱。" } },
            { thai: "ใจเย็นๆ", roman: "jai-yen-yen", eng: "Calm down", chn: "冷静点", ex: { thai: "ใจเย็นๆ นะ อย่าโกรธเลย", eng: "Calm down, don't be angry.", chn: "冷静点，别生气。" } },
            { thai: "เรื่องส่วนตัว", roman: "rùueang sùuan-dtuua", eng: "Private matter", chn: "私事", ex: { thai: "นี่เป็นเรื่องส่วนตัว", eng: "This is a private matter.", chn: "这是私事。" } },
            { thai: "เชื่อใจ", roman: "chûuea-jai", eng: "To trust", chn: "信任", ex: { thai: "ฉันเชื่อใจคุณนะ", eng: "I trust you.", chn: "我信任你。" } },
            { thai: "ล้อเล่น", roman: "láw-lên", eng: "Just kidding", chn: "开玩笑", ex: { thai: "เมื่อกี้พูดล้อเล่น", eng: "I was just kidding just now.", chn: "刚才是在开玩笑。" } },
            { thai: "จริงใจ", roman: "jing-jai", eng: "Sincere", chn: "真心 / 诚恳", ex: { thai: "เขาเป็นคนจริงใจ", eng: "He is a sincere person.", chn: "他是个诚恳的人。" } },
            { thai: "เม้าท์มอย", roman: "máo-maawy", eng: "To chat/gossip (informal)", chn: "闲聊 / 讲八卦", ex: { thai: "มาเม้าท์มอยกันหน่อย", eng: "Let's gossip a bit.", chn: "来聊五毛钱的八卦。" } },
            { thai: "โกรธ", roman: "gròot", eng: "Angry", chn: "生气", ex: { thai: "อย่าโกรธฉันเลยนะ", eng: "Please don't be angry with me.", chn: "别生我的气啦。" } },
            { thai: "รำคาญ", roman: "ram-khaan", eng: "Annoyed", chn: "讨厌 / 烦人", ex: { thai: "ฉันรำคาญเสียงดัง", eng: "I'm annoyed by the loud noise.", chn: "我讨厌巨大的噪音。" } },
            { thai: "ช่างมันเถอะ", roman: "châang-man-thùer", eng: "Forget it / Let it be", chn: "算了吧", ex: { thai: "ช่างมันเถอะ ไม่เป็นไร", eng: "Forget it, it's okay.", chn: "算了吧，没关系。" } },
            { thai: "เจอกัน", roman: "joer-gan", eng: "See you", chn: "见面", ex: { thai: "พรุ่งนี้เจอกันที่เดิม", eng: "See you tomorrow at the same place.", chn: "明天老地方见。" } },
            { thai: "ตามใจ", roman: "dtaam-jai", eng: "Up to you", chn: "随你 / 听你的", ex: { thai: "แล้วแต่คุณ ตามใจเลย", eng: "It's up to you, as you wish.", chn: "听你的，随你便。" } },
            { thai: "หวง", roman: "hǔuang", eng: "Possessive / Protective", chn: "吃醋 / 护短", ex: { thai: "เขาหวงแฟนมาก", eng: "He is very protective of his girlfriend.", chn: "他对他女朋友占有欲很强。" } },
            { thai: "เพื่อนเที่ยว", roman: "phûuean thîiao", eng: "Travel buddy", chn: "驴友 / 玩伴", ex: { thai: "หาเพื่อนเที่ยวเชียงใหม่", eng: "Looking for a buddy to travel to Chiang Mai.", chn: "找个去清迈玩的伴。" } },
            { thai: "คุยเก่ง", roman: "khui-gèng", eng: "Talkative", chn: "健谈 / 话多", ex: { thai: "น้องชายคุณคุยเก่งนะ", eng: "Your younger brother is quite talkative.", chn: "你弟弟挺能聊的。" } },
            { thai: "เข้าใจผิด", roman: "khâo-jai phìt", eng: "To misunderstand", chn: "误会", ex: { thai: "ขอโทษที่เข้าใจผิด", eng: "Sorry for misunderstanding.", chn: "抱歉，误会了。" } }
        ];

        let currentIndex = 0;
        let isFlipped = false;
        let cards = [...database];

        const cardInner = document.getElementById('cardInner');
        const progressBar = document.getElementById('progressBar');
        const counter = document.getElementById('counter');

        function updateCard() {
            const item = cards[currentIndex];
            document.getElementById('wordThai').textContent = item.thai;
            document.getElementById('wordRoman').textContent = item.roman;
            document.getElementById('wordEng').textContent = item.eng;
            document.getElementById('wordChn').textContent = item.chn;
            document.getElementById('exThai').textContent = item.ex.thai;
            document.getElementById('exEng').textContent = item.ex.eng;
            document.getElementById('exChn').textContent = item.ex.chn;

            counter.textContent = `${currentIndex + 1} / ${cards.length}`;
            progressBar.style.width = `${((currentIndex + 1) / cards.length) * 100}%`;
            isFlipped = false;
            cardInner.style.transform = 'rotateY(0deg)';
        }

        function flipCard() {
            isFlipped = !isFlipped;
            cardInner.style.transform = isFlipped ? 'rotateY(180deg)' : 'rotateY(0deg)';
        }

        function nextCard() { currentIndex = (currentIndex + 1) % cards.length; updateCard(); }
        function prevCard() { currentIndex = (currentIndex - 1 + cards.length) % cards.length; updateCard(); }
        function shuffleCards() { cards.sort(() => Math.random() - 0.5); currentIndex = 0; updateCard(); }

        function speak(text) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'th-TH'; u.rate = 0.8;
            window.speechSynthesis.speak(u);
        }
        function speakThai() { speak(cards[currentIndex].thai); }
        function speakExample() { speak(cards[currentIndex].ex.thai); }

        updateCard();
    </script>
</body>
</html>
