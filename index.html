<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thai Master Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <script src="thai_data.js"></script>
    
    <style>
        :root {
            --theme-bg: #fff1f2; --theme-primary: #f43f5e; --theme-secondary: #ffe4e6;
            --theme-dark: #881337; --theme-card-border: #fecdd3;
        }
        body { font-family: 'Sarabun', sans-serif; overflow: hidden; background-color: var(--theme-bg); transition: all 0.4s; }
        .perspective { perspective: 1000px; }
        .card-inner { transition: transform 0.6s; transform-style: preserve-3d; }
        .active-tab { border-bottom: 4px solid var(--theme-primary); color: var(--theme-primary); font-weight: bold; }
        .theme-text { color: var(--theme-primary); }
        .theme-bg-primary { background-color: var(--theme-primary); }
        .theme-bg-secondary { background-color: var(--theme-secondary); }
        .theme-border { border-color: var(--theme-card-border); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen">

    <div class="w-full max-w-md bg-white shadow-sm sticky top-0 z-10">
        <div class="pt-4 pb-1 px-4 flex justify-between items-center">
            <h1 class="text-xl font-bold" style="color: var(--theme-dark)">Thai Master</h1>
            <div class="flex gap-1.5">
                <button onclick="setTheme('pink')" class="w-4 h-4 rounded-full bg-rose-500"></button>
                <button onclick="setTheme('green')" class="w-4 h-4 rounded-full bg-emerald-500"></button>
                <button onclick="setTheme('yellow')" class="w-4 h-4 rounded-full bg-amber-400"></button>
                <button onclick="setTheme('purple')" class="w-4 h-4 rounded-full bg-purple-500"></button>
                <button onclick="setTheme('blue')" class="w-4 h-4 rounded-full bg-sky-500"></button>
                <button onclick="setTheme('mono')" class="w-4 h-4 rounded-full bg-slate-800"></button>
            </div>
        </div>
        
        <div class="flex overflow-x-auto no-scrollbar px-2 border-b border-gray-100">
            <div onclick="switchTab('greetings')" id="tab-greetings" class="tab-item px-4 py-3 text-sm text-slate-400 cursor-pointer whitespace-nowrap active-tab">Greetings</div>
            <div onclick="switchTab('travel')" id="tab-travel" class="tab-item px-4 py-3 text-sm text-slate-400 cursor-pointer whitespace-nowrap">Travel</div>
            <div onclick="switchTab('friendship')" id="tab-friendship" class="tab-item px-4 py-3 text-sm text-slate-400 cursor-pointer whitespace-nowrap">Friendship</div>
            <div onclick="switchTab('social')" id="tab-social" class="tab-item px-4 py-3 text-sm text-slate-400 cursor-pointer whitespace-nowrap">Social Media</div>
            <div onclick="switchTab('fandom')" id="tab-fandom" class="tab-item px-4 py-3 text-sm text-slate-400 cursor-pointer whitespace-nowrap">Fandom</div>
            <div onclick="switchTab('events')" id="tab-events" class="tab-item px-4 py-3 text-sm text-slate-400 cursor-pointer whitespace-nowrap">Fan Events</div>
        </div>
    </div>

    <div class="w-full max-w-md flex flex-col flex-1 p-4 h-[calc(100vh-120px)]">
        <div class="w-full bg-gray-200 rounded-full h-1.5 mb-2">
            <div id="progressBar" class="theme-bg-primary h-1.5 rounded-full transition-all duration-300"></div>
        </div>
        <div class="flex justify-between text-[10px] theme-text mb-4 font-mono uppercase tracking-widest">
            <span id="counter">0 / 0</span>
            <span id="categoryName" class="font-bold">GREETINGS</span>
        </div>

        <div class="perspective w-full flex-1 mb-6 cursor-pointer" onclick="flipCard()">
            <div id="cardInner" class="card-inner relative w-full h-full text-center">
                <div class="absolute w-full h-full bg-white rounded-3xl shadow-xl border-2 theme-border flex flex-col items-center justify-center p-8 transition-all" style="backface-visibility: hidden;">
                    <h2 id="wordThai" class="text-6xl font-bold text-slate-800 mb-4">...</h2>
                    <p id="wordRoman" class="text-xl theme-text font-mono italic">...</p>
                    <button onclick="event.stopPropagation(); speakThai()" class="mt-8 p-5 theme-bg-secondary theme-text rounded-full shadow-sm">
                        <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 5L6 9H2v6h4l5 4V5zM19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"></path></svg>
                    </button>
                </div>
                <div class="absolute w-full h-full bg-slate-800 text-white rounded-3xl shadow-2xl flex flex-col items-center justify-center p-8 transition-all" style="backface-visibility: hidden; transform: rotateY(180deg);">
                    <div class="w-full flex-1 flex flex-col justify-center">
                        <div class="mb-6 border-b border-slate-600 pb-4">
                            <h3 id="wordEng" class="text-3xl font-bold theme-text">...</h3>
                            <h3 id="wordChn" class="text-xl text-slate-400 mt-1">...</h3>
                        </div>
                        <div class="bg-slate-700/40 p-5 rounded-2xl text-left relative">
                            <button onclick="event.stopPropagation(); speakExample()" class="absolute top-4 right-4 theme-text">
                                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 5L6 9H2v6h4l5 4V5zM19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"></path></svg>
                            </button>
                            <p id="exThai" class="text-lg font-medium text-white mb-2 leading-relaxed">...</p>
                            <p id="exEng" class="text-xs opacity-70 italic mb-1">...</p>
                            <p id="exChn" class="text-xs text-slate-400">...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-4 mb-4">
            <button onclick="prevCard()" class="py-4 bg-white text-slate-600 rounded-2xl shadow font-bold">Prev</button>
            <button onclick="shuffleCards()" class="py-4 theme-bg-secondary theme-text rounded-2xl shadow">Shuffle</button>
            <button onclick="nextCard()" class="py-4 theme-bg-primary text-white rounded-2xl shadow font-bold">Next</button>
        </div>
    </div>

    <script>
        // 主题逻辑
        const themes = {
            pink: { bg: '#fff1f2', primary: '#f43f5e', secondary: '#ffe4e6', dark: '#881337', border: '#fecdd3' },
            green: { bg: '#ecfdf5', primary: '#10b981', secondary: '#d1fae5', dark: '#064e3b', border: '#a7f3d0' },
            yellow: { bg: '#fffbeb', primary: '#f59e0b', secondary: '#fef3c7', dark: '#78350f', border: '#fde68a' },
            purple: { bg: '#faf5ff', primary: '#a855f7', secondary: '#f3e8ff', dark: '#581c87', border: '#e9d5ff' },
            blue: { bg: '#f0f9ff', primary: '#0ea5e9', secondary: '#e0f2fe', dark: '#0c4a6e', border: '#bae6fd' },
            mono: { bg: '#f8fafc', primary: '#1e293b', secondary: '#e2e8f0', dark: '#0f172a', border: '#cbd5e1' }
        };

        function setTheme(t) {
            const r = document.documentElement;
            r.style.setProperty('--theme-bg', themes[t].bg);
            r.style.setProperty('--theme-primary', themes[t].primary);
            r.style.setProperty('--theme-secondary', themes[t].secondary);
            r.style.setProperty('--theme-dark', themes[t].dark);
            r.style.setProperty('--theme-card-border', themes[t].border);
        }

        // 核心逻辑
        let currentTab = 'greetings', currentIndex = 0, isFlipped = false, currentCards = [];

        function switchTab(t) {
            currentTab = t; currentIndex = 0; isFlipped = false;
            // 从外部 JS 文件加载数据
            currentCards = [...thaiData[t]];
            document.querySelectorAll('.tab-item').forEach(el => el.classList.remove('active-tab'));
            document.getElementById(`tab-${t}`).classList.add('active-tab');
            document.getElementById('categoryName').textContent = t.replace('_',' ');
            updateCard();
        }

        function updateCard() {
            const item = currentCards[currentIndex];
            if(!item) return;
            document.getElementById('wordThai').textContent = item.thai;
            document.getElementById('wordRoman').textContent = item.roman;
            document.getElementById('wordEng').textContent = item.eng;
            document.getElementById('wordChn').textContent = item.chn;
            document.getElementById('exThai').textContent = item.ex.thai;
            document.getElementById('exEng').textContent = item.ex.eng;
            document.getElementById('exChn').textContent = item.ex.chn;
            document.getElementById('counter').textContent = `${currentIndex + 1} / ${currentCards.length}`;
            document.getElementById('progressBar').style.width = `${((currentIndex+1)/currentCards.length)*100}%`;
            isFlipped = false;
            document.getElementById('cardInner').style.transform = 'rotateY(0deg)';
        }

        function flipCard() { isFlipped = !isFlipped; document.getElementById('cardInner').style.transform = isFlipped ? 'rotateY(180deg)' : 'rotateY(0deg)'; }
        function nextCard() { currentIndex = (currentIndex + 1) % currentCards.length; updateCard(); }
        function prevCard() { currentIndex = (currentIndex - 1 + currentCards.length) % currentCards.length; updateCard(); }
        function shuffleCards() { currentCards.sort(() => Math.random() - 0.5); currentIndex = 0; updateCard(); }
        function speak(text) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(text); u.lang = 'th-TH'; u.rate = 0.8; window.speechSynthesis.speak(u); }
        function speakThai() { speak(currentCards[currentIndex].thai); }
        function speakExample() { speak(currentCards[currentIndex].ex.thai); }

        window.onload = () => switchTab('greetings');
    </script>
</body>
</html>
